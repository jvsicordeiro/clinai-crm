<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
  :root{--bg:#fffdf9;--bg2:#f5f2ec;--surface:#fdfcfa;--hover:#faf8f3;--subtle:#f8f6f2;--bd-light:#f0ece4;--bd:#e8e4dc;--text:#1a1a1a;--text-l:#6b6b6b;--text-m:#737373;--card-warm:#f5f0e8;--focus-ring:#1a6b4a;--accent:#04b2a5;--accent-light:#e0f7f5;--error:#c44b4b;--error-bg:#fdf0f0;--warn:#b8860b;--warn-bg:#fdf8e8;--info:#1119a5;--info-bg:#edf4fd;--success-bg:#dcfce7;--success-bg2:#bbf7d0;--error-bg2:#fee2e2;--warn-bg2:#fde68a;--alert-warm:#fff8f3;--alert-warm2:#fef3c7;--wa-green:#25d366;--wa-green-bg:#c5f0d6;--wa-green-light:#dcfce7;--tip-bg:#1a1a1a;--tip-fg:#fff;--info-bg2:#e0e7ff;--info-bg3:#c7d2fe;--purple:#7c3aed;--purple-bg:#ede9fe;--purple-bg2:#ddd6fe;--green-soft:#f0fdf4;--rose-dark:#9f1239;--success-fg:#166534;--purple-fg:#5b21b6;--error-fg:#991b1b;--info-fg:#3730a3;--av-blue:#dbeafe;--av-blue2:#bfdbfe;--av-blue-fg:#1e40af;--av-pink:#fce7f3;--av-pink2:#fbcfe8;--av-pink-fg:#9d174d;--av-teal:#ccfbf1;--av-teal2:#99f6e4;--av-teal-fg:#115e59;--av-rose:#ffe4e6;--av-rose2:#fecdd3;--av-amber-fg:#92400e;--av-amber2-fg:#854d0e;--av-green2-fg:#14532d}
  body.dark{--bg:#131313;--bg2:#0d0d0d;--surface:#1c1c1c;--hover:#252525;--subtle:#1f1f1f;--bd-light:#2a2a2a;--bd:#333333;--text:#e8e8e8;--text-l:#a0a0a0;--text-m:#888888;--card-warm:#1f1a14;--focus-ring:#2dd4a8;--accent:#2dd4a8;--accent-light:#0d3d35;--error:#f87171;--error-bg:#3d1c1c;--warn:#f59e0b;--warn-bg:#3d2e0a;--info:#818cf8;--info-bg:#1a1f3d;--success-bg:#14402a;--success-bg2:#1a5c36;--error-bg2:#4a1c1c;--warn-bg2:#4a3510;--alert-warm:#2d1f0a;--alert-warm2:#3d2e0a;--wa-green:#25d366;--wa-green-bg:#1a4d2e;--wa-green-light:#14402a;--tip-bg:#e8e8e8;--tip-fg:#131313;--info-bg2:#1e1b4b;--info-bg3:#2d2a6e;--purple:#a78bfa;--purple-bg:#2d1f5e;--purple-bg2:#3d2a7e;--green-soft:#14402a;--rose-dark:#f87171;--success-fg:#4ade80;--purple-fg:#c4b5fd;--error-fg:#fca5a5;--info-fg:#a5b4fc;--av-blue:#1e3a5f;--av-blue2:#264a78;--av-blue-fg:#93c5fd;--av-pink:#4a1a35;--av-pink2:#5c2245;--av-pink-fg:#f9a8d4;--av-teal:#0d3d3d;--av-teal2:#155050;--av-teal-fg:#5eead4;--av-rose:#4a1a1f;--av-rose2:#5c2228;--av-amber-fg:#fbbf24;--av-amber2-fg:#f59e0b;--av-green2-fg:#4ade80}
  *{box-sizing:border-box}
  html,body,#root{margin:0;padding:0;min-height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--text)}
  :focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px;border-radius:4px}
  button:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .skip-link{position:absolute;top:-40px;left:0;background:var(--focus-ring);color:white;padding:8px 16px;z-index:9999;font-size:0.8rem;font-weight:600;border-radius:0 0 8px 0;transition:top 0.2s}
  .skip-link:focus{top:0}
  /* dark mode via CSS vars — no filter hack */
  .theme-toggle{position:fixed;top:14px;right:14px;z-index:200;border:1px solid var(--bd);background:var(--surface);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:600;color:var(--text-l)}
  input,select,textarea,button{font-family:inherit}
  /* ========== DESKTOP (>=900px) ========== */
  @media (min-width:900px){
    html,body{background:var(--bg2)}
    .theme-toggle{display:none}
    .app-root{display:flex;min-height:100vh;background:var(--bg2)}
    .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--bd);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
    .sb-head{padding:16px 18px 12px}
    .sb-logo{font-family:"Bricolage Grotesque",'Bricolage Grotesque',Georgia,serif;font-size:1.55rem;font-weight:700;letter-spacing:-0.02em;color:var(--text)}
    .sb-search{display:flex;align-items:center;gap:7px;margin:0 10px 8px;padding:6px 10px;background:transparent;border:1px solid transparent;border-radius:7px;cursor:pointer;color:var(--text-m);font-size:0.72rem;font-family:inherit;transition:all 0.15s}
    .sb-search:hover{background:var(--subtle);border-color:var(--bd)}
    .sb-nav{flex:1;padding:6px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
    .sb-sep{height:1px;background:var(--bd);margin:6px 10px;opacity:0.5}
    .sb-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;cursor:pointer;color:var(--text-l);font-size:0.78rem;font-weight:500;border:none;background:none;text-align:left;transition:all 0.12s;position:relative;width:100%;font-family:inherit}
    .sb-item:hover{background:var(--subtle);color:var(--text)}
    .sb-item.active{background:var(--subtle);color:var(--text);font-weight:600}
    .sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 4px 4px 0;background:var(--accent)}
    .sb-item svg{flex-shrink:0;opacity:0.45;transition:opacity 0.12s}
    .sb-item:hover svg{opacity:0.75}
    .sb-item.active svg{opacity:1;color:var(--accent)}
    .sb-bottom{margin-top:auto;border-top:1px solid var(--bd)}
    .sb-user{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:default}
    .sb-user .sb-avatar{width:28px;height:28px;border-radius:7px;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:700;flex-shrink:0;letter-spacing:-0.02em}
    .sb-user .sb-uinfo{flex:1;min-width:0}
    .sb-user .sb-uname{font-size:0.7rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-user .sb-uemail{font-size:0.56rem;color:var(--text-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .sb-foot{padding:6px 14px 10px;display:flex;align-items:center;justify-content:space-between}
    .sb-foot .sb-sync{display:flex;align-items:center;gap:5px;font-size:0.58rem;font-weight:500}
    .sb-foot .sb-sync .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .sb-foot .sb-actions{display:flex;align-items:center;gap:2px}
    .sb-foot .sb-abtn{width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-m);transition:all 0.12s}
    .sb-foot .sb-abtn:hover{background:var(--subtle);color:var(--text)}
    .main-wrap{margin-left:240px;flex:1;min-width:0;min-height:100vh}
    .main-inner{max-width:1320px;margin:0 auto;padding:0 32px}
    .bottom-nav{display:none !important}
    /* Top bar da página */
    .page-top{padding:28px 32px 22px !important;background:transparent !important;border-bottom:none !important;position:static !important}
    .page-top .ph1{font-size:1.7rem !important;letter-spacing:-0.03em}
    .page-body{padding:0 32px 60px !important}
    /* KPI grid vira 4 colunas */
    .kpi-grid{grid-template-columns:repeat(4,1fr) !important;gap:14px !important;margin-bottom:24px !important}
    .kpi-grid>div{padding:18px 20px !important;border-radius:14px !important}
    /* Cards gerais */
    .page-body>div[style*="background: rgb(253, 252, 250)"],.page-body .card-ex{border-radius:14px !important}
    /* Dashboard 2-col */
    .dash-main{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
    .dash-main>div{margin-bottom:0 !important}
    /* Config 2-col */
    .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
    .cfg-grid>div{margin-bottom:0 !important}
    /* Modal centralizado */
    .modal-overlay{align-items:center !important;padding:20px}
    .modal-box{max-width:640px !important;width:auto !important;min-width:min(520px,calc(100vw - 32px));border-radius:16px !important;max-height:86vh !important;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
    /* Tabela desktop */
    .desk-table{width:100%;border-collapse:separate;border-spacing:0;font-size:0.8rem;background:var(--surface);border-radius:12px;border:1px solid var(--bd);overflow:visible}
    .desk-table thead tr{background:var(--hover)}
    .desk-table th{text-align:left;padding:11px 16px;font-size:0.6rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:0.09em;border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;background:var(--hover);z-index:1}
    .desk-table td{padding:14px 16px;border-bottom:1px solid var(--bd-light);vertical-align:middle}
    .desk-table tbody tr{cursor:pointer;transition:background 0.15s}
    .desk-table tbody tr:hover td{background:var(--hover)}
    .desk-table tbody tr .row-acts{opacity:0;transition:opacity 0.15s}
    .desk-table tbody tr:hover .row-acts{opacity:1}
    .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--surface);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:16px}
    .stat-strip>div{padding:14px 16px;border-right:1px solid var(--bd-light)}
    .stat-strip>div:last-child{border-right:none}
    .stat-strip .l{font-size:0.58rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
    .stat-strip .v{font-family:'Bricolage Grotesque',Georgia,serif;font-size:1.25rem;font-weight:700;line-height:1.1}
    .stat-strip .s{font-size:0.62rem;color:var(--text-l);margin-top:3px}
    @media(max-width:720px){.stat-strip{grid-template-columns:1fr 1fr}.stat-strip>div:nth-child(2){border-right:none}.stat-strip>div:nth-child(1),.stat-strip>div:nth-child(2){border-bottom:1px solid var(--bd-light)}}
    .seg-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .seg-tabs button{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--surface);cursor:pointer;font-size:0.7rem;font-weight:500;color:var(--text-l);transition:all 0.15s}
    .seg-tabs button:hover{border-color:var(--text-m);color:var(--text)}
    .seg-tabs button.on{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:600}
    .seg-tabs button.on .cnt{background:rgba(255,255,255,0.2);color:white}
    .seg-tabs .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .seg-tabs .cnt{font-size:0.58rem;font-weight:700;background:var(--bd-light);color:var(--text-l);padding:1px 6px;border-radius:8px;min-width:14px;text-align:center}
    .stripe-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 7px;border-radius:12px;font-size:0.62rem;font-weight:600;background:var(--bd-light);color:var(--text-l)}
    .stripe-pill .d{width:6px;height:6px;border-radius:50%;display:inline-block}
    .saude-bar{display:inline-flex;align-items:center;gap:8px;min-width:78px}
    .saude-bar .num{font-size:0.78rem;font-weight:700;font-variant-numeric:tabular-nums;min-width:22px}
    .saude-bar .track{flex:1;height:5px;background:var(--bd-light);border-radius:3px;overflow:hidden}
    .saude-bar .fill{height:100%;border-radius:3px;transition:width 0.4s}
    .avatar-init{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.02em;flex-shrink:0;box-shadow:inset 0 -1px 0 rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.04)}
    .filter-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .fr-label{font-size:0.55rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:0.08em;min-width:46px}
    .seg-tabs.compact{margin-bottom:0;flex:0 1 auto}
    .sort-wrap{display:inline-flex;align-items:center;gap:6px}
    .sort-wrap label{font-size:0.55rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:0.08em}
    .sort-wrap select{font-size:0.7rem;padding:5px 26px 5px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--surface);color:var(--text);font-weight:500;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%236b6b6b' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
    .sort-wrap select:hover{border-color:var(--text-m)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-body{animation:fadeUp 0.2s ease}
    @keyframes slideInR{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideInL{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
    .drawer-content-anim-r{animation:slideInR 0.22s cubic-bezier(0.32,0.72,0,1)}
    .drawer-content-anim-l{animation:slideInL 0.22s cubic-bezier(0.32,0.72,0,1)}
    .drawer-ov{position:fixed;inset:0;background:rgba(15,15,15,0.35);z-index:1000;animation:fadeIn 0.2s ease}
    .cmd-ov{position:fixed;inset:0;background:rgba(15,15,15,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;animation:fadeIn 0.12s ease}
    .cmd-box{width:min(92vw,580px);background:var(--surface);border-radius:14px;box-shadow:0 24px 60px -12px rgba(0,0,0,0.35),0 0 0 1px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column;max-height:70vh;animation:cmdIn 0.15s cubic-bezier(0.32,0.72,0,1)}
    @keyframes cmdIn{from{opacity:0;transform:translateY(-8px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .cmd-inp{border:none;padding:16px 18px;font-size:0.95rem;font-family:inherit;background:transparent;color:var(--text);border-bottom:1px solid var(--bd-light);width:100%}
    .cmd-inp::placeholder{color:var(--text-m)}
    .cmd-list{overflow-y:auto;padding:6px 0;flex:1;min-height:0}
    .cmd-sec{font-size:0.56rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:0.1em;padding:10px 16px 4px}
    .cmd-it{display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:background 0.08s}
    .cmd-it:hover{background:var(--hover)}

function avatarColor(nome){const palette=[['var(--av-blue)','var(--av-blue2)','var(--av-blue-fg)'],['var(--success-bg)','var(--success-bg2)','var(--success-fg)'],['var(--alert-warm2)','var(--warn-bg2)','var(--av-amber-fg)'],['var(--av-pink)','var(--av-pink2)','var(--av-pink-fg)'],['var(--purple-bg)','var(--purple-bg2)','var(--purple-fg)'],['var(--av-teal)','var(--av-teal2)','var(--av-teal-fg)'],['var(--av-rose)','var(--av-rose2)','var(--rose-dark)'],['var(--info-bg2)','var(--info-bg3)','var(--info-fg)'],['var(--alert-warm2)','var(--warn-bg2)','var(--av-amber2-fg)'],['var(--success-bg)','var(--success-bg2)','var(--av-green2-fg)']];let h=0;for(let i=0;i<(nome||'').length;i++)h=((h<<5)-h+nome.charCodeAt(i))|0;return palette[Math.abs(h)%palette.length]}

function calcSaude(cli,txs,maxMrr){

  const cTx=txs.filter(t=>t.cid===cli.id&&t.tipo==='receita'&&t.data>=lim.toISOString().slice(0,10));
  let pag=100;
  for(const t of cTx){
    if(t.status==='pendente'){const d=new Date(t.data+'T12:00:00');if(d<hoje)pag-=25;}
    else if(t.status==='pago'&&t.pagoEm){const dv=new Date(t.data+'T12:00:00');const dp=new Date(t.pagoEm+'T12:00:00');const atr=Math.floor((dp-dv)/864e5);if(atr>5)pag-=10;else if(atr>0)pag-=5;}
  }
  pag=Math.max(0,Math.min(100,pag));
  // Permanencia
  const m=mesesAtivo(cli.inicio,cli.canceladoEm);
  const perm=m>=12?100:m>=6?80:m>=3?60:40;
  // Status
  const stMap={ativo:100,pendente:70,atrasado:50,pausado:40,cancelado:0};
  const stt=stMap[cli.status]??50;
  // Onboarding
  const obMap={completo:100,'em andamento':50,aguardando:20,falhou:0};
  const onb=obMap[cli.onboarding]??50;
  // Valor (relativo)
  const val=maxMrr>0?Math.round((cli.valor||0)/maxMrr*100):0;
  // Score geral
  const geral=Math.round(pag*0.4+perm*0.2+stt*0.2+onb*0.1+val*0.1);
  // Nivel + motivo
  let nivel='saudavel',motivo='Cliente em dia';
  if(cli.status==='cancelado'){nivel='risco';motivo='Cliente cancelado';}
  else if(pag<50){nivel='risco';motivo='Pagamentos com problemas';}
  else if(cli.status==='pausado'){nivel='atencao';motivo='Cliente pausado';}
  else if(geral<50){nivel='risco';motivo='Score geral baixo';}
  else if(geral<75){nivel='atencao';motivo='Precisa de atencao';}
  return{geral,pag,perm,stt,onb,val,nivel,motivo};
}

function ld(){
  try{
    // Tentar v6, depois v5, depois v4 (migracoes)
    let x=localStorage.getItem(KEY)||localStorage.getItem('clinai_crm_v5')||localStorage.getItem('clinai_crm_v4');
    if(x){
      const d=JSON.parse(x);
      if(!d.recorrencias)d.recorrencias=INIT.recorrencias;
      if(!d.leads)d.leads=INIT.leads;
      // Migrate leads: etapa + valorPotencial + etapaDesde + B2B inversion
      d.leads=d.leads.map(l=>{
        if(!l.etapa)l.etapa=l.resultado==='fechado'?'Fechado':l.resultado==='perdido'?'Perdido':'Prospecção';
        if(l.convertidoEm){const c=(d.clientes||[]).find(cl=>cl.id===l.convertidoEm);if(c)l.valorPotencial=c.valor}
        if(l.valorPotencial==null)l.valorPotencial=297;
        if(!l.etapaDesde)l.etapaDesde=l.data||today();
        // B2B: nome=empresa (primary), responsavel=pessoa (secondary)
        if(!l.responsavel&&l.nome&&l.empresa&&l.nome!==l.empresa){l.responsavel=l.nome;l.nome=l.empresa;l.empresa=l.nome}
        else if(!l.responsavel&&l.empresa){l.responsavel=l.nome;l.nome=l.empresa}
        return l;
      });
      if(!d.config)d.config=INIT.config;
      if(!d.config.orcamentos)d.config.orcamentos=INIT.config.orcamentos;
      if(!d.config.cobMsg)d.config.cobMsg=INIT.config.cobMsg;
      if(!d.asaasImported){const exist=new Set((d.transacoes||[]).map(t=>t.id));const novos=ASAAS_DESPESAS.filter(t=>!exist.has(t.id));d.transacoes=[...novos,...(d.transacoes||[])];d.asaasImported=true}
      if(d.clientes){const existIds=new Set(d.clientes.map(c=>c.id));(INIT.clientes||[]).forEach(ic=>{if(!existIds.has(ic.id))d.clientes.push({...ic})})}
      if(d.clientes){
        d.clientes=d.clientes.map(c=>{
          const ref=INIT.clientes.find(ic=>ic.id===c.id);
          if(ref){
            if(!c.cod)c.cod=ref.cod||'';
            if(!c.cnpj)c.cnpj=ref.cnpj||'';
            if(!c.cidade)c.cidade=ref.cidade||'';
            if(c.uf===undefined)c.uf=ref.uf||'';
            if(c.canceladoEm===undefined)c.canceladoEm=ref.canceladoEm||'';
            if(c.primeiroPgto===undefined)c.primeiroPgto=ref.primeiroPgto||'';
            if(c.setup===undefined)c.setup=ref.setup||0;
            if(c.onboarding===undefined)c.onboarding=ref.onboarding||'';
          } else {
            if(c.cod===undefined)c.cod='';
            if(c.cnpj===undefined)c.cnpj='';
            if(c.cidade===undefined)c.cidade='';
            if(c.uf===undefined)c.uf='';
            if(c.canceladoEm===undefined)c.canceladoEm='';
            if(c.primeiroPgto===undefined)c.primeiroPgto='';
            if(c.setup===undefined)c.setup=0;

  const dR=diffArr(data.recorrencias,prev.recorrencias);
  await Promise.all([
    sbUpsert('clientes',dC.ups.map(rowCliente),token),
    sbUpsert('transacoes',dT.ups.map(rowTx),token),
    sbUpsert('leads',dL.ups.map(rowLead),token),
    sbUpsert('recorrencias',dR.ups.map(rowRec),token),
  ]);
  await Promise.all([
    sbDeleteIds('clientes',dC.dels,token),
    sbDeleteIds('transacoes',dT.dels,token),
    sbDeleteIds('leads',dL.dels,token),
    sbDeleteIds('recorrencias',dR.dels,token),
  ]);
  if(JSON.stringify(data.config||{})!==JSON.stringify(prev.config||{})){
    await sbFetch('/rest/v1/config',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify([{chave:'main',valor:data.config||{}}])},token);
  }

function Root(){
  const[session,setSession]=useState(null);
  const[data,setData]=useState(null);
  const[phase,setPhase]=useState('checking');// checking | login | loading | ready | error
  const[err,setErr]=useState('');
  useEffect(()=>{
    (async()=>{
      try{
        const raw=localStorage.getItem(SB_SESSION_KEY);
        if(raw){
          const s=JSON.parse(raw);
          if(s.expires_at&&s.expires_at>Date.now()+60000){setSession(s);return;}
          try{
            const r=await sbRefresh(s.refresh_token);
            const ns={access_token:r.access_token,refresh_token:r.refresh_token,expires_at:Date.now()+(r.expires_in||3600)*1000,email:r.user.email};
            localStorage.setItem(SB_SESSION_KEY,JSON.stringify(ns));
            setSession(ns);return;
          }catch(e){localStorage.removeItem(SB_SESSION_KEY);}
        }
        setPhase('login');
      }catch(e){setPhase('login');}
    })();
  },[]);
  useEffect(()=>{
    if(!session)return;
    setPhase('loading');
    (async()=>{
      try{
        let d=await sbLoadStateV2(session.access_token);
        const empty=!d||((d.clientes||[]).length===0&&(d.transacoes||[]).length===0&&(d.leads||[]).length===0&&(d.recorrencias||[]).length===0);
        if(empty){
          // Seed: usa ld() local e faz save V2 (do zero contra {} = tudo upsert)
          const seed=ld();
          await sbSaveStateV2(seed,{clientes:[],transacoes:[],leads:[],recorrencias:[],config:{}},session.access_token);
          d=seed;
        }else{
          // Garante config presente
          if(!d.config||!Object.keys(d.config).length){const local=ld();d.config=local.config;}
          // Migracao one-shot: adiciona seeds novos do INIT que nao existem, apenas UMA vez por seed id.
          // Usa localStorage pra marcar quais seeds ja foram semeados, assim exclusoes nao revivem.
          try{const SEED_KEY='clinai_crm_seeded_ids';let seeded;try{seeded=new Set(JSON.parse(localStorage.getItem(SEED_KEY)||'[]'))}catch{seeded=new Set()}if(seeded.size===0&&d.clientes){d.clientes.forEach(c=>seeded.add(c.id));localStorage.setItem(SEED_KEY,JSON.stringify([...seeded]))}const existIds=new Set((d.clientes||[]).map(c=>c.id));const novos=(INIT.clientes||[]).filter(ic=>!existIds.has(ic.id)&&!seeded.has(ic.id));if(novos.length&&d.clientes){const before={clientes:[...d.clientes],transacoes:d.transacoes||[],leads:d.leads||[],recorrencias:d.recorrencias||[],config:d.config||{}};d.clientes=[...d.clientes,...novos];novos.forEach(n=>seeded.add(n.id));localStorage.setItem(SEED_KEY,JSON.stringify([...seeded]));try{await sbSaveStateV2(d,before,session.access_token)}catch(e){}}}catch(e){}
        }
        // B2B migration: nome=empresa (primary), responsavel=pessoa (secondary)
        if(d.clientes){d.clientes=d.clientes.map(c=>{
          if(!c.responsavel&&c.nome&&c.clinica&&c.nome!==c.clinica){c.responsavel=c.nome;c.nome=c.clinica;c.empresa=c.clinica}
          else if(!c.responsavel&&c.clinica){c.responsavel=c.nome;c.nome=c.clinica;c.empresa=c.clinica}
          return c;
        })}
        if(d.leads){d.leads=d.leads.map(l=>{
          if(!l.responsavel&&l.nome&&l.empresa&&l.nome!==l.empresa){l.responsavel=l.nome;l.nome=l.empresa;l.empresa=l.nome}
          else if(!l.responsavel&&l.empresa){l.responsavel=l.nome;l.nome=l.empresa}
          return l;
        })}
        setData(d);setPhase('ready');
      }catch(e){setErr('Erro ao carregar: '+e.message);setPhase('error');}
    })();
  },[session]);
  const logout=useCallback(()=>{
    localStorage.removeItem(SB_SESSION_KEY);
    setSession(null);setData(null);setPhase('login');
  },[]);
  const loadingBox=txt=><div style={{display:'flex',minHeight:'100vh',alignItems:'center',justifyContent:'center',background:cW,fontFamily:"'Plus Jakarta Sans',sans-serif",color:tL,fontSize:'0.9rem'}}>{txt}</div>;
  if(phase==='checking')return loadingBox('Verificando sessao...');
  if(phase==='login')return <LoginScreen onLogin={s=>{setSession(s);}}/>;
  if(phase==='loading')return loadingBox('Carregando dados...');
  if(phase==='error')return <div style={{padding:40,color:er,fontFamily:"'Plus Jakarta Sans',sans-serif",background:cW,minHeight:'100vh'}}>{err}<br/><button onClick={logout} style={{marginTop:16,padding:'8px 16px',background:g,color:'white',border:'none',borderRadius:6,cursor:'pointer'}}>Sair e tentar de novo</button></div>;

    const recSum=mesTx.filter(t=>t.tipo==='receita'&&t.status==='pago').reduce((a,t)=>a+t.valor,0);
    const despSum=mesTx.filter(t=>t.tipo==='despesa'&&t.status==='pago').reduce((a,t)=>a+t.valor,0);
    const saldo=recSum-despSum;
    const recPend=mesTx.filter(t=>t.tipo==='receita'&&t.status==='pendente').reduce((a,t)=>a+t.valor,0);
    const despPend=mesTx.filter(t=>t.tipo==='despesa'&&t.status==='pendente').reduce((a,t)=>a+t.valor,0);

    const hist=Array.from({length:6},(_,i)=>{
      const d=new Date(sY,sM-1-5+i,1);

      const de=mtx.filter(t=>t.tipo==='despesa'&&t.status==='pago').reduce((a,t)=>a+t.valor,0);
      return{r,de,s:r-de};
    });
    const recPts=hist.map(h=>h.r);
    const despPts=hist.map(h=>h.de);
    const salPts=hist.map(h=>h.s);

          <FKpi lb="Saldo" val={fc(saldo)} sub={saldo>=0?'no azul':'no vermelho'} color={saldo>=0?g:er} valColor={saldo>=0?g:er} pts={salPts} delta={deltaSaldo}/>
          <FKpi lb="A pagar" val={fc(despPend)} sub={despAtrasadas.length>0?`${despAtrasadas.length} vencida${despAtrasadas.length===1?'':'s'}`:'no prazo'} color={despAtrasadas.length>0?er:wn} pts={despPts}/>
        </div>
        {despAtrasadas.length>0&&<div style={{...$.card,borderLeft:`3px solid ${er}`,padding:'10px 14px',marginBottom:14,cursor:'pointer',transition:'background 0.15s'}} onClick={()=>{setFT('despesa');setFi('pendente')}} onMouseEnter={e=>e.currentTarget.style.background='var(--error-bg)'} onMouseLeave={e=>e.currentTarget.style.background=''}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:28,height:28,borderRadius:8,background:eB,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.9rem'}}>⚠</div><div style={{flex:1}}><div style={{fontSize:'0.78rem',fontWeight:700,color:'var(--text)'}}>{despAtrasadas.length} despesa{despAtrasadas.length>1?'s':''} vencida{despAtrasadas.length>1?'s':''}</div><div style={{fontSize:'0.64rem',color:tL}}>{fc(despAtrasadasTotal)} em atraso · <span style={{color:er,fontWeight:600}}>Ver pendências →</span></div></div></div></div>}
        <button style={{...$.btn,width:'100%',justifyContent:'center',marginBottom:14,gap:6,fontSize:'0.72rem',color:inf,borderColor:inf}} onClick={gerarRecorrencias}>{I.repeat} Gerar recorrências de {ml(sY,sM).slice(0,3).toLowerCase()}/{String(sY).slice(2)}</button>
        <div style={$.sw}><span style={$.si}>{I.search}</span><input style={$.sinp} placeholder="Buscar em todos os meses..." value={search} onChange={e=>setSr(e.target.value)}/></div>

        <div className="filter-row"><span className="fr-label">Tipo</span><div className="seg-tabs compact">{[{k:'todos',lb:'Todos',cor:null},{k:'receita',lb:'Receitas',cor:g},{k:'despesa',lb:'Despesas',cor:er}].map(f=>{const cnt=f.k==='todos'?list.length:list.filter(t=>t.tipo===f.k).length;return<button key={f.k} className={fTipo===f.k?'on':''} onClick={()=>setFT(f.k)}>{f.cor&&<span className="dot" style={{background:f.cor}}/>}<span>{f.lb}</span><span className="cnt">{cnt}</span></button>})}</div></div>
        <div className="filter-row"><span className="fr-label">Status</span><div className="seg-tabs compact">{[{k:'todos',lb:'Todos',cor:null},{k:'pago',lb:'Pago',cor:g},{k:'pendente',lb:'Pendente',cor:wn}].map(f=>{const cnt=f.k==='todos'?list.length:list.filter(t=>t.status===f.k).length;return<button key={f.k} className={filter===f.k?'on':''} onClick={()=>setFi(f.k)}>{f.cor&&<span className="dot" style={{background:f.cor}}/>}<span>{f.lb}</span><span className="cnt">{cnt}</span></button>})}</div></div>
        {list.length===0?(<div style={{textAlign:'center',padding:'50px 20px'}}><div style={{width:48,height:48,borderRadius:14,background:search?'linear-gradient(135deg,var(--alert-warm2),var(--warn-bg2))':'linear-gradient(135deg,var(--accent-light),var(--accent-light))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem',margin:'0 auto 12px',opacity:0.8}}>{search?I.search:I.dollar}</div><div style={{fontSize:'0.88rem',fontWeight:600,color:'var(--text)',marginBottom:4}}>{search?`Sem resultados para "${search}"`:fTipo!=='todos'||filter!=='todos'?'Nada com esses filtros':`Sem transações em ${ml(sY,sM).toLowerCase()}`}</div><div style={{fontSize:'0.68rem',color:tM,marginBottom:14}}>{search?'Tente outro termo':fTipo!=='todos'||filter!=='todos'?'Ajuste os filtros para ver mais':'Adicione sua primeira receita ou despesa'}</div>{search?<button style={{...$.btn,fontSize:'0.72rem',padding:'8px 16px'}} onClick={()=>setSr('')}>Limpar busca</button>:fTipo!=='todos'||filter!=='todos'?<button style={{...$.btn,fontSize:'0.72rem',padding:'8px 16px'}} onClick={()=>{setFT('todos');setFi('todos')}}>Limpar filtros</button>:<div style={{display:'flex',gap:8,justifyContent:'center'}}><button style={{...$.btnP,fontSize:'0.72rem',padding:'8px 16px'}} onClick={()=>{setEI(null);setModal('receita')}}>{I.plus} Receita</button><button style={{...$.btn,fontSize:'0.72rem',padding:'8px 16px'}} onClick={()=>{setEI(null);setModal('despesa')}}>{I.plus} Despesa</button></div>}</div>):isDesktop?(<table className="desk-table"><thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th className="num">Valor</th><th>Status</th></tr></thead><tbody>{list.map(t=>(<tr key={t.id} onClick={()=>{setEI(t);setModal(t.tipo==='receita'?'receita':'despesa')}}><td style={{color:tL,fontSize:'0.72rem'}}>{fd(t.data)}</td><td style={{fontSize:'0.68rem',fontWeight:600,color:t.tipo==='receita'?g:er}}>{t.tipo}</td><td style={{color:tL,fontSize:'0.72rem'}}>{t.cat}</td><td style={{fontWeight:500}}>{t.desc}</td><td className="num" style={{fontWeight:700,color:t.tipo==='receita'?g:er}}>{t.tipo==='despesa'?'- ':''}{fc(t.valor)}</td><td><span className="badge" style={$.badge(t.status)}>{t.status}</span></td></tr>))}</tbody></table>):list.map(t=>(<div key={t.id} style={$.tr} onClick={()=>{setEI(t);setModal(t.tipo==='receita'?'receita':'despesa')}}><div style={{width:32,height:32,borderRadius:8,background:t.tipo==='receita'?gL:eB,color:t.tipo==='receita'?g:er,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{t.tipo==='receita'?I.dollar:I.card}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:'0.8rem',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.desc}</div><div style={{fontSize:'0.68rem',color:tL}}>{t.cat} · {fd(t.data)}</div></div><div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:'0.8rem',fontWeight:600,color:t.tipo==='receita'?g:er}}>{t.tipo==='despesa'?'- ':''}{fc(t.valor)}</div><span style={$.badge(t.status)}>{t.status}</span></div><div style={{color:bd,flexShrink:0,marginLeft:4}}>{I.chevR}</div></div>))}
      </div></>)};

  // ========== CONFIG ==========
  const Cfg=()=>{
    const[cfg,setCfg]=useState(data.config);
    const recs=data.recorrencias||[];
    const recsAtivas=recs.filter(r=>r.ativo);
    const totalFixo=recsAtivas.reduce((a,r)=>a+r.valor,0);
    const pixOk=!!(cfg.pixChave&&cfg.pixNome);
    const orcTotal=Object.values(cfg.orcamentos||{}).reduce((a,v)=>a+(+v||0),0);
    // Uso do orçamento no mês atual
    const mesTx=data.transacoes.filter(t=>t.data?.startsWith(sK)&&t.tipo==='despesa'&&t.status==='pago');
    const gastoPorCat={};
    mesTx.forEach(t=>{gastoPorCat[t.cat]=(gastoPorCat[t.cat]||0)+t.valor});
    const orcEstorado=CD.filter(cat=>{const lim=(cfg.orcamentos||{})[cat]||0;return lim>0&&(gastoPorCat[cat]||0)>lim});
    const syncLabel=syncState==='ok'?'sincronizado':syncState==='saving'?'salvando...':syncState==='pending'?'pendente':'erro';
    const syncColor=syncState==='ok'?g:syncState==='error'?er:wn;
    const SecHeader=({icon,title,desc,bg,action})=>(<div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,paddingBottom:12,borderBottom:`1px solid ${al(bd,'44')}`}}><div style={{width:32,height:32,borderRadius:8,background:bg||gL,display:'flex',alignItems:'center',justifyContent:'center',color:g,flexShrink:0}}>{icon}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:'0.82rem',fontWeight:700,color:'var(--text)',fontFamily:"'Bricolage Grotesque',Georgia,serif"}}>{title}</div>{desc&&<div style={{fontSize:'0.62rem',color:tL,marginTop:1}}>{desc}</div>}</div>{action}</div>);
    const MiniKpi=({lb,val,sub,subColor,color,icon})=>(<div style={{...$.kpi(color),display:'flex',flexDirection:'column',gap:3,minHeight:82}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{...$.kl,fontSize:'0.6rem'}}>{lb}</div>{icon&&<div style={{marginLeft:'auto',color}}>{icon}</div>}</div><div style={{...$.kv,fontSize:'1.1rem',lineHeight:1.1}}>{val}</div><div style={{marginTop:'auto',fontSize:'0.6rem',color:subColor||tM,fontWeight:subColor?600:400}}>{sub}</div></div>);
    return(<>
      <div className="page-top" style={$.top}><div><div className="ph1" style={$.h1}>Configurações</div><div style={$.sub}>PIX, recorrências, orçamento e dados · <span style={{color:syncColor,fontWeight:600}}>● {syncLabel}</span></div></div></div>
      <div className="page-body" style={$.body}>
        <div className="kpi-grid" style={$.kg}>
          <MiniKpi lb="Recorrências" val={String(recsAtivas.length)} sub={recsAtivas.length>0?`${fc(totalFixo)} fixo/mês`:'nenhuma ativa'} color={inf}/>
          <MiniKpi lb="Orçamento" val={orcTotal>0?fc(orcTotal):'—'} sub={orcEstorado.length>0?`${orcEstorado.length} categoria${orcEstorado.length>1?'s':''} estourada${orcEstorado.length>1?'s':''}`:orcTotal>0?'dentro do limite':'não configurado'} subColor={orcEstorado.length>0?er:undefined} color={orcEstorado.length>0?er:g}/>
          <MiniKpi lb="PIX" val={pixOk?'Configurado':'Faltando'} sub={pixOk?cfg.pixChave.length>28?cfg.pixChave.slice(0,25)+'...':cfg.pixChave:'preencha abaixo'} subColor={pixOk?undefined:wn} color={pixOk?g:wn}/>
          <MiniKpi lb="Sincronia" val={syncLabel} sub="Supabase em tempo real" subColor={syncColor} color={syncColor}/>
        </div>

        {orcEstorado.length>0&&<div style={{...$.card,borderLeft:`3px solid ${er}`,padding:'10px 14px',marginBottom:14}}><div style={{fontSize:'0.6rem',fontWeight:700,color:er,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>⚠ Orçamento estourado</div><div style={{fontSize:'0.76rem',fontWeight:600,color:'var(--text)',marginBottom:4}}>{orcEstorado.length} categoria{orcEstorado.length>1?'s':''} passou do limite em {ml(sY,sM).toLowerCase()}</div><div style={{fontSize:'0.64rem',color:tL}}>{orcEstorado.map(c=>`${c} (${fc(gastoPorCat[c]||0)}/${fc((cfg.orcamentos||{})[c]||0)})`).join(' · ')}</div></div>}

          <div style={{marginTop:14}}><div style={$.lbl}>Mensagem de cobrança (template)</div><textarea style={{...$.inp,resize:'vertical',fontSize:'0.74rem',fontFamily:'monospace'}} rows={7} value={cfg.cobMsg||''} onChange={e=>setCfg({...cfg,cobMsg:e.target.value})}/><div style={{fontSize:'0.6rem',color:tM,marginTop:4}}>Variáveis: {'{nome}'} {'{nomeCompleto}'} {'{valor}'} {'{dia}'} {'{pix}'} {'{clinica}'}</div><button style={{...$.btnS,marginTop:6,fontSize:'0.62rem'}} onClick={()=>setCfg({...cfg,cobMsg:'Olá {nome},\n\nPassando para lembrar sobre a fatura da Clinai.\n\nValor: {valor}\nVencimento: dia {dia}\n\nChave PIX: {pix}\n\nAtt, Equipe Clinai'})}>Restaurar padrão</button></div>

        </div>

        <div style={$.card}>
          <SecHeader icon={I.card} bg="var(--alert-warm2)" title="Orçamento mensal" desc="Limite por categoria — alertas quando ultrapassar"/>

          <button style={{...$.btnP,marginTop:10,width:'100%',justifyContent:'center'}} onClick={()=>{setData(p=>({...p,config:cfg}));showT('Orçamentos salvos')}}>Salvar orçamentos</button>
        </div>

        <div style={$.card}>

  // ========== MODALS ==========
  const UFS=['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA','MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN','RO','RR','RS','SC','SE','SP','TO','EX'];

  // ===== Modal de detalhe do cliente (Fase 1: 5 eixos + timeline) =====
  const MCliDetalhe=()=>{
    if(!editItem)return null;

    const[tab,setTab]=useState('visao');

    const sd=saudeMap[c.id]||calcSaude(c,data.transacoes,maxMrr);

    const meses=mesesAtivo(c.inicio,c.canceladoEm);
    const cTxs=data.transacoes.filter(t=>t.cid===c.id&&t.tipo==='receita');
    const close=()=>{setModal(null);setEI(null)};
    const sCor=sd.nivel==='saudavel'?g:sd.nivel==='atencao'?wn:er;
    const[avBg,avMid,avFg]=avatarColor(c.nome);
    const avGrad=`linear-gradient(135deg,${avBg} 0%,${avMid} 100%)`;

    // Insight inteligente

      const txPagos=cTxs.filter(t=>t.status==='pago').length;
      const pendVencida=cTxs.find(t=>{if(t.status!=='pendente')return false;return new Date(t.data+'T12:00:00')<new Date()});
      if(pendVencida)arr.push({tone:'risco',txt:`Tem cobranca vencida desde ${fd(pendVencida.data)} no valor de ${fc(pendVencida.valor)}.`});
      if(c.status==='ativo'&&sd.pag===100&&txPagos>=6)arr.push({tone:'positivo',txt:`Excelente histórico: <strong>${txPagos} pagamentos</strong> em dia, sem atrasos.`});
      if(c.status==='ativo'&&c.valor&&c.valor<mediaMrr*0.7)arr.push({tone:'oportunidade',txt:`MRR ${fc(c.valor)} está <strong>${Math.round((1-c.valor/mediaMrr)*100)}% abaixo</strong> da média (${fc(mediaMrr)}). Oportunidade de upgrade.`});
      if(c.status==='cancelado')arr.push({tone:'risco',txt:`Cliente cancelado em ${fd(c.canceladoEm)}. Considerar tentativa de recuperação.`});
      if(meses>=12&&c.status==='ativo')arr.push({tone:'positivo',txt:`Cliente fiel há <strong>${meses} meses</strong>. LTV de ${fc(ltv)}.`});
      if(c.onboarding==='aguardando'&&c.status==='ativo')arr.push({tone:'oportunidade',txt:`Onboarding ainda aguardando. Acelerar para reduzir risco de churn.`});
      if(arr.length===0)arr.push({tone:'positivo',txt:`Cliente em dia. Sem alertas no momento.`});
      return arr;
    })();
    // Eventos timeline
    const events=[];
    cTxs.forEach(t=>{
      if(t.status==='pago')events.push({data:t.pagoEm||t.data,tipo:'pago',titulo:`Pagamento recebido`,sub:fc(t.valor)+(t.cat?` · ${t.cat}`:''),cor:g,bg:gL,icon:'$'});
      else if(t.status==='pendente'){const venc=new Date(t.data+'T12:00:00');const atr=venc<new Date();events.push({data:t.data,tipo:atr?'atrasado':'pendente',titulo:atr?`Cobrança vencida`:`Cobrança pendente`,sub:fc(t.valor),cor:atr?er:wn,bg:atr?eB:wB,icon:'!'});}
    });

    if(c.onboarding==='completo'&&c.primeiroPgto)events.push({data:c.primeiroPgto,tipo:'onboarding',titulo:`Onboarding concluido`,sub:'Primeira mensalidade recebida',cor:g,bg:gL,icon:'✓'});

    events.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
    // Agrupa por mes
    const grupos=(()=>{const g={};events.forEach(e=>{const k=(e.data||'').slice(0,7);if(!k)return;if(!g[k])g[k]=[];g[k].push(e)});return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]))})();

    const Bar=({label,val})=>{const cor=val>=75?g:val>=50?wn:er;return(<div style={{marginBottom:9}}><div style={{display:'flex',justifyContent:'space-between',fontSize:'0.62rem',marginBottom:4,color:tL}}><span style={{fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em'}}>{label}</span><span style={{fontWeight:700,color:cor,fontVariantNumeric:'tabular-nums'}}>{val}</span></div><div style={{height:5,background:'var(--bd-light)',borderRadius:3,overflow:'hidden'}}><div style={{width:val+'%',height:'100%',background:cor,transition:'width 0.5s'}}/></div></div>);};

            <div style={{marginTop:6,display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>

            </div>
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center',marginLeft:4}}>

        </div>
        {navList.length>1&&navIdx>=0&&<div style={{padding:'4px 22px',fontSize:'0.58rem',color:tM,background:'var(--hover)',borderBottom:`1px solid ${bd}`,letterSpacing:'0.04em'}}>{navIdx+1} de {navList.length} · use ← → pra navegar</div>}

        <div className="drawer-tabs">

        </div>

        <div className={'drawer-body'+(slideDir==='r'?' drawer-content-anim-r':slideDir==='l'?' drawer-content-anim-l':'')} ref={bodyRef} key={c.id}>

            <div className="insight-card">

            <div className="info-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>

            </div>

            {(c.status==='ativo'||c.status==='atrasado')&&c.diaVenc&&(()=>{const now2=new Date();now2.setHours(0,0,0,0);const vEM=new Date(now2.getFullYear(),now2.getMonth(),c.diaVenc);vEM.setHours(0,0,0,0);const dias=Math.ceil((vEM-now2)/864e5);const rNome=(c.responsavel||c.nome).split(' ')[0];const pix=data.config.pixChave||'';const empresa=c.nome||'';const mesAtual=String(new Date().getMonth()+1).padStart(2,'0');const anoAtual=new Date().getFullYear();const vencFull=`${String(c.diaVenc).padStart(2,'0')}/${mesAtual}/${anoAtual}`;const lnk=asaasLink||'';const pgLnk=lnk?`\nPagamento: ${lnk}`:'';const etapas=[{id:'d-3',label:'D-3',desc:'Lembrete',msg:`*Mensagem automática — Lembrete | Clinai*\n\nOlá, ${rNome}.\n\nSua fatura vence em 3 dias.\n\nValor: *${fc(c.valor)}*\nVencimento: *${vencFull}*${pgLnk}\n\n_Caso já tenha pago, favor desconsiderar esta mensagem._`},{id:'d0',label:'D',desc:'Vencimento',msg:`*Mensagem automática — Vencimento | Clinai*\n\nOlá, ${rNome}.\n\nSua fatura vence hoje.\n\nValor: *${fc(c.valor)}*${pgLnk}\n\n_Caso já tenha pago, favor desconsiderar esta mensagem._`},{id:'d+3',label:'D+3',desc:'Cobrança',msg:`*Mensagem automática — Fatura em aberto | Clinai*\n\n${rNome}, identificamos que sua fatura com vencimento em *${vencFull}* ainda não foi quitada.\n\nValor: *${fc(c.valor)}*${pgLnk}\n\nSolicitamos a regularização para continuidade do serviço.\n\n_Em caso de dúvidas, responda esta mensagem._`},{id:'d+7',label:'D+7',desc:'Alerta',msg:`*Mensagem automática — Pendência | Clinai*\n\n${rNome}, sua fatura encontra-se vencida há *7 dias*.\n\nValor pendente: *${fc(c.valor)}*\nVencimento original: *${vencFull}*${pgLnk}\n\nA permanência desta pendência poderá resultar na *suspensão do serviço*.\n\nSolicitamos retorno ou regularização imediata.`},{id:'d+15',label:'D+15',desc:'Suspensão',msg:`*Mensagem automática — Suspensão | Clinai*\n\n${rNome}, sua fatura está vencida há *15 dias* sem registro de pagamento.\n\nValor pendente: *${fc(c.valor)}*${pgLnk}\n\nO serviço será *suspenso em até 3 dias úteis* caso não regularizado.\n\nPara tratar desta pendência, responda esta mensagem.`}];let ai=0;if(dias<=0)ai=1;if(dias<=-3)ai=2;if(dias<=-7)ai=3;if(dias<=-15)ai=4;const sm=msg=>{const ph=(c.wpp||'').replace(/\D/g,'');window.open(`https://wa.me/55${ph}?text=${encodeURIComponent(msg)}`,'_blank')};return(<div style={{background:'var(--surface)',border:`1px solid ${bd}`,borderRadius:12,padding:'14px 16px',marginBottom:14}}><div style={{fontSize:'0.52rem',fontWeight:700,color:tM,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Régua de Cobrança</div><div style={{display:'flex',alignItems:'center',marginBottom:12,position:'relative'}}><div style={{position:'absolute',top:10,left:16,right:16,height:2,background:bd,zIndex:0}}/><div style={{position:'absolute',top:10,left:16,height:2,background:g,zIndex:1,width:`${Math.min(ai/4*100,100)}%`,transition:'width 0.3s'}}/>{etapas.map((e,i)=>(<div key={e.id} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',zIndex:2}}><div style={{width:20,height:20,borderRadius:'50%',background:i<=ai?g:'var(--surface)',border:`2px solid ${i<=ai?g:bd}`,display:'flex',alignItems:'center',justifyContent:'center'}}>{i<=ai&&<div style={{width:6,height:6,borderRadius:'50%',background:'white'}}/>}</div><div style={{fontSize:'0.6rem',fontWeight:700,color:i===ai?g:tM,marginTop:4}}>{e.label}</div><div style={{fontSize:'0.55rem',color:tL}}>{e.desc}</div></div>))}</div><div style={{marginBottom:10}}><div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}><div style={{fontSize:'0.58rem',fontWeight:600,color:tL}}>Link de pagamento</div>{asaasLink&&<span style={{fontSize:'0.5rem',color:g,fontWeight:700}}>✓ ativo</span>}</div><input style={{...$.inp,fontSize:'0.68rem',padding:'6px 10px'}} placeholder="Cole o link do Asaas aqui..." value={asaasLink} onChange={e=>setAsaasLink(e.target.value.trim())}/>{!asaasLink&&<div style={{fontSize:'0.54rem',color:er,marginTop:3,fontWeight:500}}>Cole o link do Asaas para liberar o envio.</div>}</div><div style={{display:'flex',gap:4,flexWrap:'wrap',opacity:asaasLink?1:0.4}}>{etapas.map((e,i)=>(<button key={e.id} disabled={!asaasLink} style={{...$.btnS,flex:1,justifyContent:'center',fontSize:'0.62rem',padding:'5px 4px',color:!asaasLink?tM:i===ai?'var(--wa-green)':tM,borderColor:!asaasLink?bd:i===ai?'var(--wa-green)':bd,fontWeight:i===ai&&asaasLink?700:500,minWidth:50,cursor:asaasLink?'pointer':'not-allowed'}} onClick={()=>{if(asaasLink)sm(e.msg)}}>{I.wa} {e.label}</button>))}</div><div style={{fontSize:'0.58rem',color:tM,marginTop:6,textAlign:'center'}}>{dias>3?`Vencimento em ${dias} dias`:dias>0?`Vence em ${dias} dia${dias>1?'s':''}`:dias===0?'Vence hoje':`Vencido há ${Math.abs(dias)} dia${Math.abs(dias)>1?'s':''}`}</div></div>)})()}

          {tab==='hist'&&<>

        <div style={{...$.row,marginBottom:12}}><div><div style={$.lbl}>MRR real (R$) *</div><input style={$.inp} type="number" value={mrr} onChange={e=>setMrr(e.target.value)}/>{propostaOrig>0&&Number(mrr)!==propostaOrig&&<div style={{fontSize:'0.58rem',color:descontoPct>0?wn:inf,marginTop:3}}>{descontoPct>0?`▼ ${descontoPct.toFixed(0)}% de desconto vs. proposta`:`▲ ${Math.abs(descontoPct).toFixed(0)}% acima da proposta`}</div>}</div><div><div style={$.lbl}>Plano</div><select style={$.inp} value={plano} onChange={e=>setPlano(e.target.value)}><option value="">— selecionar —</option>{PLANOS.map(p=><option key={p} value={p}>{p}</option>)}</select></div></div>
        <div style={{...$.row,marginBottom:12}}><div><div style={$.lbl}>Ciclo</div><select style={$.inp} value={ciclo} onChange={e=>setCiclo(e.target.value)}>{CICLOS.map(c=><option key={c} value={c}>{c}</option>)}</select></div><div><div style={$.lbl}>Setup (R$)</div><input style={$.inp} type="number" value={setup} onChange={e=>setSetup(e.target.value)} placeholder="497"/></div></div>
        <div style={{...$.row,marginBottom:12}}><div><div style={$.lbl}>Data de inicio</div><input style={$.inp} type="date" value={inicio} onChange={e=>setInicio(e.target.value)}/></div><div><div style={$.lbl}>Dia de vencimento</div><input style={$.inp} type="number" min="1" max="28" value={diaVenc} onChange={e=>setDiaVenc(e.target.value)}/></div></div>
        <div style={{...$.row,marginBottom:12}}><div style={{flex:1}}><div style={$.lbl}>Desconto</div><select style={$.inp} value={desconto} onChange={e=>setDesconto(e.target.value)}>{DESCONTOS.map(d=><option key={d} value={d}>{d}</option>)}</select></div></div>
        {cicloDias!==null&&<div style={{background:'var(--bd-light)',borderRadius:8,padding:'8px 10px',marginBottom:12,fontSize:'0.65rem',color:tL}}>Ciclo de conversao: <strong>{cicloDias} dia{cicloDias!==1?'s':''}</strong> desde o primeiro contato</div>}
        <div style={{marginBottom:10}}><div style={$.lbl}>Observacoes</div><textarea style={{...$.inp,resize:'vertical'}} rows={2} value={notas} onChange={e=>setNotas(e.target.value)}/></div>
      </div>
      <div style={$.mf}><button style={{...$.btn,flex:1,justifyContent:'center'}} onClick={close}>Cancelar</button><button style={{...$.btnP,flex:1,justifyContent:'center',background:g}} onClick={save}>{dupe&&merge?'Atualizar cliente':'Criar cliente'}</button></div>
    </div></div>);
  };

  const MLoseLead=()=>{
    const lead=editItem;
    const isOpen=modal==='loseLead'&&!!lead;
    const[motivo,setMotivo]=useState('');
    const[detalhe,setDetalhe]=useState('');
    const wasOpen=useRef(false);
    useEffect(()=>{
      if(isOpen&&!wasOpen.current){
        setMotivo(lead.motivoPerda||lead.motivo||'');
        setDetalhe(lead.motivoPerdaDetalhe||'');
      }
      wasOpen.current=isOpen;
    },[isOpen,lead]);
    if(!isOpen)return null;
    const close=()=>{setModal(null);setEI(null)};
    const[avBg,avMid,avFg]=avatarColor(lead.nome);
    const save=()=>{
      if(!motivo){showT('Selecione o motivo');return}
      setData(p=>({...p,leads:(p.leads||[]).map(x=>x.id===lead.id?{...x,etapa:'Perdido',resultado:'perdido',etapaDesde:today(),motivo,motivoPerda:motivo,motivoPerdaDetalhe:detalhe}:x)}));
      showT('Lead marcado como perdido');
      close();
    };
    return(<div className="modal-overlay" style={$.ov} onClick={close}><div className="modal-box" style={{...$.mod,maxWidth:420}} onClick={e=>e.stopPropagation()}>
      <div style={$.mh}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,var(--error-bg2),var(--error-bg))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem'}}>❌</div><div><div style={{fontFamily:"'Bricolage Grotesque',Georgia,serif",fontSize:'1.05rem',fontWeight:700,lineHeight:1.1}}>Perder Lead</div><div style={{fontSize:'0.62rem',color:tM,marginTop:2}}>Registrar motivo da perda</div></div></div><button style={{border:'none',background:'none',cursor:'pointer',color:tL}} onClick={close} aria-label="Fechar">{I.x}</button></div>
      <div style={$.mb}>
        <div style={{background:'var(--subtle)',border:`1px solid ${bd}`,borderRadius:10,padding:'10px 12px',marginBottom:14,display:'flex',alignItems:'center',gap:10}}><div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${avBg},${avMid})`,color:avFg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.64rem',fontWeight:700,flexShrink:0}}>{initials(lead.nome)}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:'0.8rem',fontWeight:700}}>{lead.nome}</div><div style={{fontSize:'0.6rem',color:tL,marginTop:1}}>{lead.responsavel?`${lead.responsavel}${lead.cargo?` · ${lead.cargo}`:''}`:''}{lead.origem?' · via '+lead.origem:''}</div></div><div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:'0.7rem',fontWeight:700,color:er}}>{fc(lead.valorPotencial||0)}</div><div style={{fontSize:'0.55rem',color:tM}}>perdido</div></div></div>
        <div style={{marginBottom:12}}><div style={$.lbl}>Motivo *</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>{MOTIVOS.map(m=>(<button key={m} type="button" onClick={()=>setMotivo(m)} style={{padding:'8px 10px',fontSize:'0.68rem',textAlign:'left',border:`1px solid ${motivo===m?er:bd}`,background:motivo===m?eB:'var(--surface)',color:motivo===m?er:tL,fontWeight:motivo===m?700:500,borderRadius:8,cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'all 0.12s'}}>{m}</button>))}</div></div>
        <div style={{marginBottom:10}}><div style={$.lbl}>Detalhe (opcional)</div><textarea style={{...$.inp,resize:'vertical'}} rows={2} value={detalhe} onChange={e=>setDetalhe(e.target.value)} placeholder="Ex: achou caro, migrou pro concorrente X, voltar no Q2..."/></div>
      </div>
      <div style={$.mf}><button style={{...$.btn,flex:1,justifyContent:'center'}} onClick={close}>Cancelar</button><button style={{...$.btnP,flex:1,justifyContent:'center',background:er}} onClick={save}>Marcar como perdido</button></div>
    </div></div>);
  };

  const NAV_MAIN=[['dash','Dashboard',I.dash],['pipe','Pipeline',I.trend],['clientes','Clientes',I.users],['cob','Cobranças',I.cal],['fin','Financeiro',I.dollar]];
  const NAV_SEC=[['config','Configurações',I.gear]];
  const NAV=[...NAV_MAIN,...NAV_SEC];
  const cmdItems=useMemo(()=>{
    const its=[];
    const navs=[['dash','Dashboard','Visão geral','📊'],['pipe','Pipeline','Leads e oportunidades','📈'],['clientes','Clientes','Base de clientes','👥'],['cob','Cobranças','Faturas e pagamentos','💳'],['fin','Financeiro','Receitas e despesas','💰'],['config','Configurações','PIX, recorrências, orçamento','⚙️']];
    navs.forEach(([k,lb,ds,em])=>its.push({id:'go:'+k,sec:'Navegar',lb,ds,em,bg:'var(--bd-light)',fg:'var(--text)',action:()=>go(k)}));
    its.push({id:'new:cli',sec:'Criar',lb:'Novo cliente',ds:'Cadastrar cliente ativo',em:'+',bg:'var(--success-bg)',fg:'var(--success-fg)',action:()=>{setEI(null);setModal('cliente')}});
    its.push({id:'new:lead',sec:'Criar',lb:'Novo lead',ds:'Registrar oportunidade',em:'+',bg:'var(--purple-bg)',fg:'var(--purple-fg)',action:()=>{setEI(null);setModal('lead')}});
    its.push({id:'new:rec',sec:'Criar',lb:'Nova receita',ds:'Entrada de dinheiro',em:'+',bg:'var(--success-bg)',fg:'var(--success-fg)',action:()=>{setEI(null);setModal('receita')}});
    its.push({id:'new:desp',sec:'Criar',lb:'Nova despesa',ds:'Saída de dinheiro',em:'+',bg:'var(--error-bg2)',fg:'var(--error-fg)',action:()=>{setEI(null);setModal('despesa')}});
    its.push({id:'new:reco',sec:'Criar',lb:'Nova despesa recorrente',ds:'Automatizar gasto fixo',em:'↻',bg:'var(--info-bg2)',fg:'var(--info-fg)',action:()=>{go('config');setTimeout(()=>{setEI(null);setModal('recorrencia')},50)}});
    (data?.clientes||[]).forEach(c=>{const[bg,,fg]=avatarColor(c.nome);const resp=c.responsavel||'';const cg=c.cargo?` · ${c.cargo}`:'';its.push({id:'cli:'+c.id,sec:'Clientes',lb:c.nome,ds:resp+cg+(c.status&&c.status!=='ativo'?((resp||cg)?' · ':'')+c.status:''),em:initials(c.nome),bg,fg,action:()=>{setEI(c);setModal('clienteDetalhe')}})});
    (data?.leads||[]).filter(l=>!l.clienteGeradoId).forEach(l=>{const[bg,,fg]=avatarColor(l.nome);const cg=l.cargo?` · ${l.cargo}`:'';its.push({id:'lead:'+l.id,sec:'Leads',lb:l.nome,ds:(l.responsavel||'')+cg+' · '+l.etapa,em:initials(l.nome),bg,fg,action:()=>{setEI(l);setModal('lead')}})});
    (data?.transacoes||[]).slice().sort((a,b)=>(b.data||'').localeCompare(a.data||'')).slice(0,120).forEach(t=>its.push({id:'tx:'+t.id,sec:'Transações',lb:t.desc,ds:t.cat+' · '+fc(t.valor)+' · '+(t.data?fd(t.data):''),em:t.tipo==='receita'?'↑':'↓',bg:t.tipo==='receita'?'var(--success-bg)':'var(--error-bg2)',fg:t.tipo==='receita'?'var(--success-fg)':'var(--error-fg)',action:()=>{setEI(t);setModal(t.tipo==='receita'?'receita':'despesa')}}));
    return its;
  },[data,go]);
  const cmdResults=useMemo(()=>{
    if(!cmdOpen)return[];
    const q=cmdQ.trim();
    if(!q)return cmdItems.filter(i=>i.sec==='Navegar'||i.sec==='Criar');
    const qn=norm(q);
    return cmdItems.map(i=>{const lbl=norm(i.lb);const dsc=norm(i.ds||'');let sc=0;if(lbl===qn)sc=200;else if(lbl.startsWith(qn))sc=120;else if(lbl.includes(' '+qn))sc=90;else if(lbl.includes(qn))sc=60;else if(dsc.includes(qn))sc=25;if(sc>0&&(i.sec==='Navegar'||i.sec==='Criar'))sc+=5;return sc>0?{...i,sc}:null}).filter(Boolean).sort((a,b)=>b.sc-a.sc).slice(0,40);
  },[cmdOpen,cmdQ,cmdItems]);
  useEffect(()=>{setCmdIdx(0)},[cmdQ,cmdOpen]);
  useEffect(()=>{if(!cmdOpen)return;const h=e=>{if(e.key==='Escape'){e.preventDefault();setCmdOpen(false);return}if(e.key==='ArrowDown'){e.preventDefault();setCmdIdx(i=>Math.min(i+1,Math.max(0,cmdResults.length-1)));return}if(e.key==='ArrowUp'){e.preventDefault();setCmdIdx(i=>Math.max(0,i-1));return}if(e.key==='Enter'){e.preventDefault();const it=cmdResults[cmdIdx];if(it){setCmdOpen(false);it.action()}return}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[cmdOpen,cmdResults,cmdIdx]);
  useEffect(()=>{if(!cmdOpen)return;const el=document.querySelector('.cmd-it.on');if(el)el.scrollIntoView({block:'nearest'})},[cmdIdx,cmdOpen]);
  const renderCmdPalette=()=>{if(!cmdOpen)return null;const groups={};cmdResults.forEach((it,i)=>{if(!groups[it.sec])groups[it.sec]=[];groups[it.sec].push({...it,_i:i})});const order=['Navegar','Criar','Clientes','Leads','Transações'];return(<div className="cmd-ov" onClick={()=>setCmdOpen(false)}><div className="cmd-box" onClick={e=>e.stopPropagation()}><input className="cmd-inp" placeholder="Buscar empresa, lead, transação ou ação..." value={cmdQ} onChange={e=>setCmdQ(e.target.value)} autoFocus aria-label="Buscar no CRM" role="combobox" aria-expanded="true" aria-controls="cmd-results"/><div className="cmd-list" id="cmd-results" role="listbox">{cmdResults.length===0?<div className="cmd-empty">Nenhum resultado para "<strong>{cmdQ}</strong>"</div>:order.filter(s=>groups[s]).map(s=>(<div key={s}><div className="cmd-sec">{s}</div>{groups[s].map(it=>(<div key={it.id} className={'cmd-it'+(it._i===cmdIdx?' on':'')} onMouseEnter={()=>setCmdIdx(it._i)} onClick={()=>{setCmdOpen(false);it.action()}}><div className="ic" style={{background:it.bg,color:it.fg}}>{it.em}</div><div className="tx"><div className="lb">{it.lb}</div>{it.ds&&<div className="ds">{it.ds}</div>}</div><span className="tg">{it.sec}</span></div>))}</div>))}</div><div className="cmd-foot"><div className="cmd-kbd"><kbd>↑</kbd><kbd>↓</kbd> navegar · <kbd>↵</kbd> abrir · <kbd>esc</kbd> fechar</div><div>{cmdResults.length} resultado{cmdResults.length!==1?'s':''}</div></div></div></div>)};
  const Sidebar=()=>{const uEmail=session?.email||'';const uName=uEmail.split('@')[0].replace(/[._-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());const uInitials=uName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?';const syncDot=syncState==='ok'?g:syncState==='error'?er:wn;const syncTxt=syncState==='ok'?'Sync':syncState==='saving'?'Salvando':syncState==='pending'?'Pendente':'Erro';const isDark=document.body.classList.contains('dark');return(<aside className="sidebar desktop-only"><div className="sb-head"><div className="sb-logo"><img src={LOGO_CLINAI} alt="Clinai" style={{width:'100%',maxWidth:120,height:'auto'}}/></div></div><button className="sb-search" onClick={()=>{setCmdOpen(true);setCmdQ('');setCmdIdx(0)}}><span style={{display:'flex',opacity:0.5}}>{I.search}</span><span style={{flex:1,textAlign:'left'}}>Buscar...</span><kbd style={{background:'var(--subtle)',border:'none',borderRadius:4,padding:'2px 6px',fontSize:'0.55rem',fontWeight:600,color:'var(--text-m)',fontFamily:'inherit'}}>⌘K</kbd></button><nav className="sb-nav" aria-label="Navegação principal">{NAV_MAIN.map(([k,l,ic])=><button key={k} className={"sb-item"+(page===k?" active":"")} onClick={()=>go(k)} aria-current={page===k?'page':undefined} aria-label={l}>{ic}<span>{l}</span></button>)}<div className="sb-sep"/>{NAV_SEC.map(([k,l,ic])=><button key={k} className={"sb-item"+(page===k?" active":"")} onClick={()=>go(k)} aria-current={page===k?'page':undefined} aria-label={l}>{ic}<span>{l}</span></button>)}</nav><div className="sb-bottom"><div className="sb-user"><div className="sb-avatar">{uInitials}</div><div className="sb-uinfo"><div className="sb-uname">{uName}</div><div className="sb-uemail">{uEmail}</div></div></div><div className="sb-foot"><div className="sb-sync" title={syncTxt}><span className="dot" style={{background:syncDot}}/><span style={{color:syncDot}}>{syncTxt}</span></div><div className="sb-actions"><button className="sb-abtn" onClick={()=>{document.body.classList.toggle('dark');try{localStorage.setItem('clinai_theme',document.body.classList.contains('dark')?'dark':'light')}catch(e){}}} title="Alternar tema" aria-label="Alternar tema">{isDark?<svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>:<svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>}</button><button className="sb-abtn" onClick={onLogout} title="Sair" aria-label="Sair"><svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div></div></div></aside>)};
  return(<div className="app-root" style={$.app}>
    {Sidebar()}
    <main className="main-wrap" id="main-content" role="main"><div className="main-inner">
    {page==='dash'&&Dash()}{page==='pipe'&&Pip()}{page==='clientes'&&Cli()}{page==='cob'&&Cob()}{page==='fin'&&Fin()}{page==='config'&&<Cfg/>}
    </div></main>
    {MCli()}{modal==='clienteDetalhe'&&<MCliDetalhe/>}{modal==='lead'&&<MLead/>}{modal==='receita'&&<MTx tipo="receita"/>}{modal==='despesa'&&<MTx tipo="despesa"/>}{modal==='recorrencia'&&<MRec/>}{MWinLead()}{MLoseLead()}
    {renderCmdPalette()}
    {ConfirmDel()}
    {toast&&<div style={$.toast} role="status" aria-live="polite">{toast==='__undo__'?<><svg width="16" height="16" fill="none" stroke="var(--warn)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg><span>Excluído</span><button onClick={doUndo} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',padding:'3px 10px',borderRadius:6,fontSize:'0.72rem',fontWeight:700,cursor:'pointer',marginLeft:4}}>Desfazer</button></>:<><svg width="16" height="16" fill="none" stroke="var(--success-fg)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>{toast}</>}</div>}
    <nav className="bottom-nav" style={$.nav} aria-label="Navegação mobile"><button style={$.ni(page==='dash')} onClick={()=>go('dash')} aria-label="Dashboard" aria-current={page==='dash'?'page':undefined}>{I.dash}<span>Dash</span></button><button style={$.ni(page==='pipe')} onClick={()=>go('pipe')} aria-label="Pipeline" aria-current={page==='pipe'?'page':undefined}>{I.trend}<span>Pipeline</span></button><button style={$.ni(page==='clientes')} onClick={()=>go('clientes')} aria-label="Clientes" aria-current={page==='clientes'?'page':undefined}>{I.users}<span>Clientes</span></button><button style={$.ni(page==='cob')} onClick={()=>go('cob')} aria-label="Cobranças" aria-current={page==='cob'?'page':undefined}>{I.cal}<span>Cobrar</span></button><button style={$.ni(page==='fin')} onClick={()=>go('fin')} aria-label="Financeiro" aria-current={page==='fin'?'page':undefined}>{I.dollar}<span>Financ.</span></button><button style={$.ni(page==='config')} onClick={()=>go('config')} aria-label="Configurações" aria-current={page==='config'?'page':undefined}>{I.gear}<span>Config</span></button></nav>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body></html>
